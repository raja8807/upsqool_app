        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor (Manual for Onboarding) -->
<header class="fixed top-0 w-full z-50 bg-[#F8F9FA]/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<button class="w-10 h-10 flex items-center justify-center text-primary active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-[#006B58] font-black text-2xl tracking-tighter italic">upsQool</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</div>
</header>
<main class="flex-1 w-full max-w-md px-6 pt-24 pb-40 flex flex-col">
<!-- Editorial Header -->
<div class="mb-10 pr-12">
<h1 class="text-3xl font-bold text-on-surface leading-tight tracking-tight mb-3">
                What does your child enjoy?
            </h1>
<p class="text-on-surface-variant text-lg leading-relaxed opacity-80">
                Select a few to personalize the experience
            </p>
</div>
<!-- Interests Grid (Asymmetric Bento-ish layout within constraints) -->
<div class="grid grid-cols-2 gap-4">
<!-- Item: Drawing (Selected State Example) -->
<button class="flex flex-col items-start p-6 rounded-lg bg-primary-container text-on-primary shadow-sm ring-2 ring-primary transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl" data-icon="palette">palette</span>
</div>
<span class="font-headline font-semibold text-lg">Drawing</span>
</button>
<!-- Item: Sports -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="sports_soccer">sports_soccer</span>
</div>
<span class="font-headline font-semibold text-lg">Sports</span>
</button>
<!-- Item: Music -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="music_note">music_note</span>
</div>
<span class="font-headline font-semibold text-lg">Music</span>
</button>
<!-- Item: Reading -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="menu_book">menu_book</span>
</div>
<span class="font-headline font-semibold text-lg">Reading</span>
</button>
<!-- Item: Puzzles -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="extension">extension</span>
</div>
<span class="font-headline font-semibold text-lg">Puzzles</span>
</button>
<!-- Item: Dance -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="self_improvement">self_improvement</span>
</div>
<span class="font-headline font-semibold text-lg">Dance</span>
</button>
<!-- Item: Science -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="biotech">biotech</span>
</div>
<span class="font-headline font-semibold text-lg">Science</span>
</button>
<!-- Item: Nature -->
<button class="flex flex-col items-start p-6 rounded-lg bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-low transition-all duration-300">
<div class="w-12 h-12 flex items-center justify-center bg-primary/10 rounded-full mb-4">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="eco">eco</span>
</div>
<span class="font-headline font-semibold text-lg">Nature</span>
</button>
</div>
<!-- Visual Anchor Background Decoration (Faint) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-[80px] -z-10"></div>
<div class="fixed top-1/2 -right-32 w-80 h-80 bg-secondary-container/10 rounded-full blur-[100px] -z-10"></div>
</main>
<!-- Bottom Footer Anchor (Fixed) -->
<footer class="fixed bottom-0 left-0 w-full bg-[#F8F9FA]/90 backdrop-blur-xl px-6 pt-6 pb-10 flex flex-col items-center gap-6">
<!-- Progress Indicator -->
<div class="flex flex-col items-center gap-2">
<span class="text-label-sm font-label uppercase tracking-widest text-on-surface-variant/60 font-semibold text-[10px]">
                Step 1 of 2
            </span>
<div class="flex gap-1">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-8 rounded-full bg-outline-variant/30"></div>
</div>
</div>
<!-- Continue Action -->
<button class="w-full max-w-md py-4 rounded-lg bg-gradient-to-r from-secondary-container to-[#FC8A40] text-white font-headline font-bold text-lg shadow-lg active:scale-[0.98] transition-transform duration-200">
            Continue
        </button>
</footer>
