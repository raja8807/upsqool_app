<body class="bg-background font-body text-on-surface min-h-screen pb-24">
<!-- Top Bar Navigation (Task-Focused: No BottomNav/SideNav per Rule) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none flex justify-between items-center px-6 py-4">
<button class="text-primary font-medium hover:opacity-70 transition-all">Cancel</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-teal-700">Add Activity</h1>
<button class="text-primary font-bold hover:opacity-70 transition-all">Save</button>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Editorial Header Section -->
<div class="mb-10">
<span class="text-primary font-bold tracking-widest text-[11px] uppercase block mb-2">New Entry</span>
<h2 class="font-headline text-3xl font-extrabold text-on-surface leading-tight">
                Capture the <span class="text-primary">Growth</span>
</h2>
<p class="text-on-surface-variant body-lg mt-2">Every moment matters. Tag your child's progress with precision and heart.</p>
</div>
<form class="space-y-10">
<!-- Activity Name Section -->
<section class="space-y-4">
<label class="font-headline font-semibold text-on-surface-variant text-sm block ml-1">Activity Name</label>
<div class="bg-surface-container-low rounded-DEFAULT p-4 focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline p-0 text-lg font-medium" placeholder="e.g., Reading together" type="text"/>
</div>
</section>
<!-- Duration Chips Section -->
<section class="space-y-4">
<label class="font-headline font-semibold text-on-surface-variant text-sm block ml-1">Duration</label>
<div class="flex flex-wrap gap-3">
<button class="bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant px-6 py-3 rounded-full text-sm font-semibold transition-colors" type="button">15 min</button>
<button class="bg-primary text-on-primary px-6 py-3 rounded-full text-sm font-semibold shadow-md" type="button">30 min</button>
<button class="bg-surface-container-low hover:bg-surface-container-high text-on-surface-variant px-6 py-3 rounded-full text-sm font-semibold transition-colors" type="button">1 hr</button>
</div>
</section>
<!-- Q Selection: Asymmetric Multi-select Grid -->
<section class="space-y-4">
<div class="flex justify-between items-end mb-4">
<label class="font-headline font-semibold text-on-surface-variant text-sm block ml-1">Development Focus</label>
<span class="text-primary text-[11px] font-bold tracking-widest uppercase">Select all that apply</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Intelligence -->
<button class="group flex items-center gap-4 bg-primary text-on-primary p-4 rounded-DEFAULT transition-all active:scale-95 shadow-lg" type="button">
<div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<span class="font-headline font-bold text-sm">Intelligence</span>
</button>
<!-- Emotional -->
<button class="group flex items-center gap-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface p-4 rounded-DEFAULT transition-all active:scale-95" type="button">
<div class="w-12 h-12 rounded-full bg-secondary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-secondary-container" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<span class="font-headline font-bold text-sm">Emotional</span>
</button>
<!-- Creative -->
<button class="group flex items-center gap-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface p-4 rounded-DEFAULT transition-all active:scale-95" type="button">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-primary-container" data-icon="palette" style="font-variation-settings: 'FILL' 1;">palette</span>
</div>
<span class="font-headline font-bold text-sm">Creative</span>
</button>
<!-- Physical -->
<button class="group flex items-center gap-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface p-4 rounded-DEFAULT transition-all active:scale-95" type="button">
<div class="w-12 h-12 rounded-full bg-tertiary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-tertiary-container" data-icon="directions_run" style="font-variation-settings: 'FILL' 1;">directions_run</span>
</div>
<span class="font-headline font-bold text-sm">Physical</span>
</button>
<!-- Values (Span 2 for asymmetry) -->
<button class="group col-span-2 flex items-center gap-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface p-4 rounded-DEFAULT transition-all active:scale-95" type="button">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl text-primary" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<span class="font-headline font-bold text-sm">Values</span>
</button>
</div>
</section>
<!-- Media/Notes Glassmorphism Section (Additional context) -->

<div class="relative overflow-hidden rounded-lg p-6 bg-surface-container-low">

<div>
<h4 class="font-headline font-bold text-on-surface">Add Photo Memory</h4>
<p class="text-xs text-on-surface-variant">Visual archives for later years</p>
</div>
<button class="w-10 h-10 rounded-full bg-white/80 backdrop-blur-md flex items-center justify-center shadow-sm" type="button">
<span class="material-symbols-outlined text-primary" data-icon="add_a_photo">add_a_photo</span>
</button>
</div>
</div>
</section>

<div class="pt-6 pb-12">
<button class="w-full h-16 bg-gradient-to-r from-secondary to-secondary-container text-white font-headline font-bold text-lg rounded-lg shadow-xl shadow-secondary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>

<p class="text-center text-outline-variant text-[11px] mt-4 uppercase tracking-[2px]">Logged data is stored securely in your family cloud</p>
